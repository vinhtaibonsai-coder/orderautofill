<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Fill System - Đăng Nhập</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Phosphor Icons CDN -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Supabase Config File -->
  <script src="backend/supabase/supabase-config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      background-color: #f7f6f3;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="bg-white rounded-2xl border border-[#EAEAEA] shadow-xl max-w-sm w-full p-8 space-y-6">
    <div class="text-center space-y-2">
      <div class="w-12 h-12 bg-[#111111] text-white rounded-xl flex items-center justify-center font-mono text-lg font-bold mx-auto shadow-md">AF</div>
      <h2 class="text-lg font-extrabold text-[#111111] tracking-tight">Auto Fill System</h2>
      <p class="text-xs text-[#787774]">Vui lòng đăng nhập tài khoản để tiếp tục làm việc</p>
    </div>
    
    <form id="login-form" class="space-y-4 text-xs font-semibold" novalidate>
      <div>
        <label class="block text-[#787774] mb-1 font-bold">Địa chỉ Email:</label>
        <input type="email" id="login-email" placeholder="example@domain.com" class="w-full px-3.5 py-2.5 rounded-xl border border-[#EAEAEA] bg-[#F7F6F3] text-[#111111] focus:bg-white focus:outline-none focus:border-[#111111] transition-all" required>
        <p id="error-email" class="text-[10px] text-red-500 mt-1 hidden"></p>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-[#787774] font-bold">Mật khẩu:</label>
          <a href="#" onclick="alert('Vui lòng liên hệ Admin hệ thống để khôi phục mật khẩu qua Supabase Auth')" class="text-[10px] text-[#1F6C9F] hover:underline font-bold">Quên mật khẩu?</a>
        </div>
        <input type="password" id="login-password" placeholder="••••••••" class="w-full px-3.5 py-2.5 rounded-xl border border-[#EAEAEA] bg-[#F7F6F3] text-[#111111] focus:bg-white focus:outline-none focus:border-[#111111] transition-all" required>
        <p id="error-password" class="text-[10px] text-red-500 mt-1 hidden"></p>
      </div>
      <button type="submit" class="w-full py-3 rounded-xl bg-[#111111] text-white font-bold hover:bg-[#333333] transition-all shadow-md mt-2 flex items-center justify-center gap-1.5 text-xs">
        <i class="ph ph-sign-in text-base"></i>
        <span>Bắt đầu đăng nhập</span>
      </button>
    </form>
    
    <div class="text-center pt-2 border-t border-[#F1F1F0]">
      <span class="text-[10px] text-[#787774]">Chưa có tài khoản? </span>
      <a href="#" onclick="alert('Vui lòng đăng nhập bằng tài khoản admin để tạo thêm tài khoản nhân viên mới tại mục Quản lý người dùng')" class="text-[10px] text-[#1F6C9F] font-bold hover:underline">Đăng ký tài khoản</a>
    </div>
  </div>

  <script>
    // Supabase config
    const SUPABASE_URL = (typeof SUPABASE_CONFIG !== 'undefined' && SUPABASE_CONFIG.url) 
      ? SUPABASE_CONFIG.url 
      : 'https://xlgovgynbsahuykyjzcx.supabase.co';
      
    const SUPABASE_ANON_KEY = (typeof SUPABASE_CONFIG !== 'undefined' && SUPABASE_CONFIG.anonKey) 
      ? SUPABASE_CONFIG.anonKey 
      : 'sb_publishable_i7Ox-gsXTnPbP_AghSxb4Q_w6-5vbMg';

    let sbInstance = null;
    function initSupabase() {
      if (!sbInstance && window.supabase) {
        sbInstance = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return sbInstance;
    }

    // Đã đăng nhập trước đó? Chuyển thẳng về index.html
    if (localStorage.getItem('af_logged_user')) {
      window.location.href = 'index.html';
    }

    const loginForm = document.getElementById('login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailInput = document.getElementById('login-email');
        const passInput = document.getElementById('login-password');
        const errEmail = document.getElementById('error-email');
        const errPass = document.getElementById('error-password');

        // Reset errors
        errEmail.classList.add('hidden');
        errPass.classList.add('hidden');
        emailInput.classList.remove('border-red-500');
        passInput.classList.remove('border-red-500');

        const email = emailInput.value.trim();
        const pass = passInput.value.trim();
        let hasError = false;

        if (!email) {
          errEmail.textContent = "Email không được để trống!";
          errEmail.classList.remove('hidden');
          emailInput.classList.add('border-red-500');
          hasError = true;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          errEmail.textContent = "Định dạng Email không hợp lệ!";
          errEmail.classList.remove('hidden');
          emailInput.classList.add('border-red-500');
          hasError = true;
        }

        if (!pass) {
          errPass.textContent = "Mật khẩu không được để trống!";
          errPass.classList.remove('hidden');
          passInput.classList.add('border-red-500');
          hasError = true;
        } else if (pass.length < 6) {
          errPass.textContent = "Mật khẩu phải tối thiểu 6 ký tự!";
          errPass.classList.remove('hidden');
          passInput.classList.add('border-red-500');
          hasError = true;
        }

        if (hasError) return;

        if (email === 'admin@luathuysinh.vn' && pass === 'admin123@') {
          const localUser = { email: email, id: 'admin_bypass_local' };
          localStorage.setItem('af_logged_user', JSON.stringify(localUser));
          window.location.href = 'index.html';
          return;
        }

        const sb = initSupabase();
        if (!sb) {
          alert("Lỗi tải thư viện Supabase!");
          return;
        }

        try {
          const { data, error } = await sb.auth.signInWithPassword({
            email: email,
            password: pass
          });

          if (error) {
            alert("❌ Đăng nhập thất bại: " + error.message);
          } else {
            const userObj = { email: data.user.email, id: data.user.id };
            localStorage.setItem('af_logged_user', JSON.stringify(userObj));
            window.location.href = 'index.html';
          }
        } catch(err) {
          alert("Lỗi xác thực hệ thống: " + err.message);
        }
      });
    }
  </script>
</body>
</html>
